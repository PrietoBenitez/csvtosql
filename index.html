<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CSV → SQL Generator</title>

    <!-- Styles -->
    <link rel="stylesheet" href="style.css">

    <!-- CSV Parser -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body>

    <div class="container">

        <div class="card">

            <!-- TITLE -->
            <h1>CSV → SQL Generator</h1>


            <!-- DROPZONE -->
            <div id="dropZone" class="dropzone">

                <div id="fileName"></div>

                <p>Drag & Drop CSV here</p>
                <p class="or">or</p>

                <input type="file" id="csvFile">

            </div>


            <!-- PREVIEW SECTION -->
            <div id="previewSection">

                <h3>Detected Columns</h3>
                <div id="columns"></div>

                <h3>Preview</h3>
                <div id="previewTable"></div>

            </div>


            <!-- TABLE NAME INPUT -->
            <input
                type="text"
                id="tableName"
                placeholder="Table name (example: users)"
            >


            <!-- DATABASE SELECT -->
            <select id="dbType">

                <option value="mysql">MySQL</option>
                <option value="postgres">PostgreSQL</option>
                <option value="sqlite">SQLite</option>
                <option value="sqlserver">SQL Server</option>

            </select>


            <!-- ACTION BUTTONS -->
            <div class="buttons">

                <button class="generate" onclick="generateSQL()">
                    Generate SQL
                </button>

                <button class="create" onclick="generateCreateTable()">
                    Generate Table
                </button>

                <button class="copy" onclick="copySQL()">
                    Copy SQL
                </button>

                <button class="download" onclick="downloadSQL()">
                    Download SQL
                </button>

                <button class="clear" onclick="clearAll()">
                    Clear
                </button>

            </div>


            <!-- OUTPUT -->
            <textarea
                id="output"
                placeholder="SQL output will appear here..."
            ></textarea>

        </div>

    </div>


    <!-- SCRIPT -->
    <script src="script.js"></script>

</body>
</html>
