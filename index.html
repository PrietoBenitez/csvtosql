<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>CSVtoSQL Generator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<div class="card">

<h1>CSV → SQL Generator</h1>

<div id="dropZone" class="dropzone">
<p>Drag & Drop CSV here</p>
<p>or</p>
<input type="file" id="csvFile">
</div>

<div id="previewSection">

<h3>Detected Columns</h3>
<div id="columns"></div>

<h3>Preview</h3>
<div id="previewTable"></div>

</div>

<input type="text" id="tableName" placeholder="Table name">

<select id="dbType">

<option value="mysql">MySQL</option>
<option value="postgres">PostgreSQL</option>
<option value="sqlite">SQLite</option>
<option value="sqlserver">SQL Server</option>

</select>

<div class="buttons">
<button class="generate" onclick="generateSQL()">Generate SQL</button>
<button class="copy" onclick="copySQL()">Copy SQL</button>
<button class="download" onclick="downloadSQL()">Download SQL</button>
</div>

<textarea id="output"></textarea>

</div>

</div>
</html>
